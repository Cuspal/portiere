# FHIR required fields per resource
required_fields:
  Patient: ["id", "gender"]
  Condition: ["id", "code", "subject"]
  Observation: ["id", "status", "code", "subject"]
  MedicationRequest: ["id", "status", "intent", "medicationCodeableConcept", "subject"]
  Procedure: ["id", "status", "code", "subject"]
  Encounter: ["id", "status", "class", "subject"]
  AllergyIntolerance: ["id", "patient"]
  DiagnosticReport: ["id", "status", "code", "subject"]
  Practitioner: ["id"]
  Organization: ["id"]
  Location: ["id"]
  Specimen: ["id"]
  Immunization: ["id", "status", "vaccineCode", "patient", "occurrenceDateTime"]
  ServiceRequest: ["id", "status", "intent", "subject"]
  MedicationAdministration: ["id", "status", "medicationCodeableConcept", "subject", "effectiveDateTime"]
  MedicationDispense: ["id", "status", "medicationCodeableConcept", "subject"]
  Bundle: ["id", "type"]
  DocumentReference: ["id", "status", "content"]

