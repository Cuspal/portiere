name: Feature Request
description: Propose new functionality or an enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before proposing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Portiere do? Sketch the API or workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
  - type: dropdown
    id: scope
    attributes:
      label: Scope category
      options:
        - Standards coverage (OMOP / FHIR / HL7v2 / OpenEHR / new CDM)
        - Knowledge layer / vector backends
        - LLM providers / prompts
        - ETL engines (Polars / Spark / Pandas / DuckDB)
        - Data quality / plausibility / validation
        - Reproducibility / manifests
        - Mapping review workflow / UI
        - CLI / packaging
        - Documentation / examples
        - Other
    validations:
      required: true
  - type: input
    id: standard
    attributes:
      label: Affected health-data standard(s) (if applicable)
      placeholder: "e.g., OMOP CDM v5.4, FHIR R4, HL7 v2.5.1"
  - type: textarea
    id: context
    attributes:
      label: Additional context
